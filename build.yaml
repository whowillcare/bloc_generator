builders:
  i18n_builder:
    import: 'package:bloc_generator/builder.dart'
    builder_factories: ['i18nBuilder']
    build_extensions: {'.i18n.yaml': ['.i18n.dart']}
    auto_apply: dependents
    build_to: source

  bloc_builder:
    import: 'package:bloc_generator/builder.dart'
    builder_factories: ['blocBuilder']
    build_extensions: {
      '.bloc.yaml': [
        '.dart',
        '.s.dart',
        '.e.dart',
        '.b.dart',
        '.d.dart',
        '.c.dart'
      ]
    }
    auto_apply: dependents
    build_to: source
    runs_before: ["json_serializable:json_serializable"]
