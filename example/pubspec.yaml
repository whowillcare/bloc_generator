name: example
description: A complete example demonstrating the use of flutter_bloc_generator.
version: 1.0.0
publish_to: none

environment:
  sdk: '>=3.8.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^8.1.3
  hydrated_bloc: ^9.1.2
  replay_bloc: ^0.2.0
  equatable: ^2.0.5
  json_annotation: ^4.12.0

dev_dependencies:
  build_runner: ^2.4.6
  json_serializable: ^6.7.1
  bloc_gen_plus:
    path: ../
